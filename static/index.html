<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Kanban en Tiempo Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar or Header -->
        <header class="header">
            <div class="header-left">
                <h1>Tablero Kanban</h1>
                <span class="status-badge offline" id="connection-status">Conectando...</span>
            </div>
            
            <div class="header-controls">
                <div class="user-selector">
                    <label for="filter-user">Usuario:</label>
                    <select id="filter-user">
                        <option value="Todos">Todos</option>
                        <option value="Andrea">Andrea</option>
                        <option value="Luis">Luis</option>
                        <option value="Carlos">Carlos</option>
                    </select>
                </div>
                <div class="month-selector">
                    <label for="filter-month">Mes:</label>
                    <select id="filter-month">
                        <option value="Todos">Todos</option>
                        <option value="Enero">Enero</option>
                        <option value="Febrero">Febrero</option>
                        <option value="Marzo">Marzo</option>
                        <option value="Abril">Abril</option>
                        <option value="Mayo">Mayo</option>
                    </select>
                </div>
                <button class="btn-primary" id="btn-add-task">+ Nueva Tarea</button>
            </div>
        </header>

        <!-- Kanban Board -->
        <main class="board" id="board">
            <!-- Esta Semana -->
            <div class="bcol" data-bucket="week">
                <div class="bcol-header">
                    <h2>Esta Semana</h2>
                    <span class="count" id="count-week">0</span>
                </div>
                <div class="bcol-body" id="col-week"></div>
            </div>
            
            <!-- Este Mes -->
            <div class="bcol" data-bucket="month">
                <div class="bcol-header">
                    <h2>Este Mes</h2>
                    <span class="count" id="count-month">0</span>
                </div>
                <div class="bcol-body" id="col-month"></div>
            </div>
            
            <!-- En Revisión -->
            <div class="bcol" data-bucket="review">
                <div class="bcol-header">
                    <h2>En Revisión</h2>
                    <span class="count" id="count-review">0</span>
                </div>
                <div class="bcol-body" id="col-review"></div>
            </div>
            
            <!-- Completados -->
            <div class="bcol done-col" data-bucket="done">
                <div class="bcol-header">
                    <h2>Completados</h2>
                    <span class="count" id="count-done">0</span>
                </div>
                <div class="bcol-body" id="col-done"></div>
            </div>
        </main>
    </div>

    <!-- Modal para Nueva/Editar Tarea -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Agregar Tarea</h3>
                <button class="btn-close" id="btn-close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    <div class="form-group">
                        <label>Título</label>
                        <input type="text" id="task-title" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="task-desc" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Columna</label>
                            <select id="task-bucket">
                                <option value="week">Esta Semana</option>
                                <option value="month">Este Mes</option>
                                <option value="review">En Revisión</option>
                                <option value="done">Completados</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Prioridad</label>
                            <select id="task-priority">
                                <option value="Alta">Alta</option>
                                <option value="Media" selected>Media</option>
                                <option value="Baja">Baja</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Asignado A</label>
                            <select id="task-user">
                                <option value="Andrea">Andrea</option>
                                <option value="Luis">Luis</option>
                                <option value="Carlos">Carlos</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Mes</label>
                            <select id="task-month">
                                <option value="Enero">Enero</option>
                                <option value="Febrero">Febrero</option>
                                <option value="Marzo">Marzo</option>
                                <option value="Abril">Abril</option>
                                <option value="Mayo" selected>Mayo</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" id="btn-cancel">Cancelar</button>
                        <button type="submit" class="btn-primary" id="btn-save">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
